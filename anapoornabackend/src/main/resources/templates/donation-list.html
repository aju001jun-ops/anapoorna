 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Annapoorna | Donation List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#d4fc79,#96e6a1);
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    padding:40px;
}

.card{
    background:rgba(255,255,255,.25);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 32px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0b5d1e;
    margin-bottom:25px;
    font-weight:bold;
}

.table{
    background:white;
    border-radius:15px;
    overflow:hidden;
}

thead{
    background:#198754;
    color:white;
}

img{
    border-radius:10px;
    object-fit:cover;
}

.btn-success{
    float:right;
    margin-bottom:20px;
}

.btn-danger{
    border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>🥗 Food Donation List</h2>
<form th:action="@{/donation/search}" method="get" class="mb-4">

    <div class="row">

        <div class="col-md-10">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="🔍 Search by Donor Name">

        </div>

        <div class="col-md-2">

            <button type="submit" class="btn btn-success w-100">

                Search

            </button>

        </div>

    </div>

</form>

<a href="/donation/add" class="btn btn-success">
    + New Donation
</a>

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>ID</th>

<th>Donor Name</th>

<th>Food Image</th>

<th>Category</th>

<th>Food Type</th>

<th>Quantity</th>

<th>Pickup Location</th>

<th>Receiver</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="d : ${list}">

<td th:text="${d.id}"></td>

<td th:text="${d.donorName}"></td>

<td>

<img th:src="@{'/uploads/' + ${d.imageName}}"
     width="100"
     height="80">

</td>

<td th:text="${d.category}"></td>

<td th:text="${d.foodType}"></td>

<td th:text="${d.quantity}"></td>

<td th:text="${d.pickupLocation}"></td>

<td th:text="${d.receiver}"></td>

<td>

<span class="badge bg-warning text-dark"
      th:if="${d.status=='Pending'}">
      Pending
</span>

<span class="badge bg-primary"
      th:if="${d.status=='Accepted'}">
      Accepted
</span>

<span class="badge bg-success"
      th:if="${d.status=='Completed'}">
      Completed
</span>

</td>

 <td>

<a th:href="@{'/donation/edit/'+${d.id}}"
class="btn btn-warning btn-sm">

Edit

</a>

<a th:href="@{'/donation/delete/'+${d.id}}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</body>

</html>
