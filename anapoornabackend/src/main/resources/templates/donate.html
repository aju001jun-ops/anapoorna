<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<title>Anapoorna | Donate Food</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#d4fc79,#96e6a1);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    padding:30px;
}

.card{
    width:800px;
    background:rgba(255,255,255,.25);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    box-shadow:0 8px 32px rgba(0,0,0,.2);
    border:1px solid rgba(255,255,255,.3);
}

h2{
    text-align:center;
    color:#0b5d1e;
    margin-bottom:30px;
    font-weight:bold;
}

.form-control,
.form-select{
    border-radius:12px;
    border:none;
    padding:12px;
    background:rgba(255,255,255,.8);
}

.form-control:focus,
.form-select:focus{
    box-shadow:0 0 10px #198754;
}

label{
    font-weight:600;
    color:#14532d;
}

.btn-success{
    width:100%;
    padding:12px;
    border-radius:12px;
    font-size:18px;
    transition:.3s;
}

.btn-success:hover{
    transform:scale(1.02);
}

.logo{
    text-align:center;
    font-size:45px;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">🥗</div>

<h2>Annapoorna Food Donation</h2>

 <form th:action="@{/donation/save}"
      th:object="${donation}"
      method="post"
      enctype="multipart/form-data">

    <input type="hidden" th:field="*{id}">

<div class="row">

<div class="col-md-6 mb-3">

<label>Donor Name</label>

<input
type="text"
class="form-control"
th:field="*{donorName}"
placeholder="Enter Donor Name">

</div>

<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input
type="text"
class="form-control"
th:field="*{phone}"
placeholder="Enter Phone Number">

</div>

</div>

<div class="mb-3">

<label>Food Image</label>

<input
type="file"
name="imageFile"
class="form-control">

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Food Category</label>

<select
class="form-select"
th:field="*{category}">
<option value="">Select Category</option>
<option value="Veg">Veg</option>
<option value="Non Veg">Non Veg</option>
<option value="Snacks">Snacks</option>
<option value="Fruits">Fruits</option>
<option value="Bakery">Bakery</option>
<option value="Beverages">Beverages</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>Food Type</label>

<input
type="text"
class="form-control"
th:field="*{foodType}"
placeholder="Ex: Lemon Rice">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Quantity</label>

<input
type="text"
class="form-control"
th:field="*{quantity}"
placeholder="20 Meals">

</div>

<div class="col-md-6 mb-3">

<label>Pickup Time</label>

<input
type="time"
class="form-control"
th:field="*{pickupTime}">

</div>

</div>

<div class="mb-3">

<label>Pickup Location</label>

<input
type="text"
class="form-control"
th:field="*{pickupLocation}"
placeholder="Enter Pickup Address">

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Receiver</label>

<input
type="text"
class="form-control"
th:field="*{receiver}"
placeholder="Orphanage / Elderly Person">

</div>

<div class="col-md-6 mb-3">

<label>Status</label>
<select
class="form-select"
th:field="*{status}">

<option value="Pending">Pending</option>

<option value="Accepted">Accepted</option>

<option value="Completed">Completed</option>

</select>
</div>

</div>

<button
type="submit"
class="btn btn-success">

🍱 Donate Food

</button>

</form>

</div>

</body>

</html>
