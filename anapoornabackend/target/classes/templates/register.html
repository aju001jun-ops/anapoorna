<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Annapoorna | User Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg">

                <div class="card-header bg-success text-white text-center">

                    <h2>Annapoorna</h2>

                    <p>User Registration</p>

                </div>

                <div class="card-body">

                    <form th:object="${user}" method="post" th:action="@{/saveUser}">

                        <div class="mb-3">

                            <label class="form-label">Full Name</label>

                            <input type="text" class="form-control" th:field="*{name}" placeholder="Enter Full Name">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Email</label>

                            <input type="email" class="form-control" th:field="*{email}" placeholder="Enter Email">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Phone Number</label>

                            <input type="text" class="form-control" th:field="*{phone}" placeholder="Enter Phone Number">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">Password</label>

                            <input type="password" class="form-control" th:field="*{password}" placeholder="Enter Password">

                        </div>

                        <button class="btn btn-success w-100">

                            Register

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
